<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jostar 3D</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding-top:50px;
}

h1{
    color:gold;
}

button{
    background:gold;
    border:none;
    padding:15px 30px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>🎮 Jostar 3D</h1>

<p>Bienvenido a tu primera experiencia NFC.</p>

<button onclick="abrirCofre()">Abrir Cofre</button>

<h2 id="premio" style="opacity:0; transition:1s; color:gold;"></h2>

<script>

const premios = [
"🗡️ ¡Has obtenido la Espada Maestra!",
"🏹 ¡Has obtenido el Arco del Héroe!",
"🛡️ ¡Has obtenido el Escudo Hyliano!",
"💎 ¡Has encontrado un Rubí Rojo!",
"🧪 ¡Has obtenido una Poción!"
];

function abrirCofre(){

    let premio = document.getElementById("premio");

    let numero = Math.floor(Math.random() * premios.length);

    premio.innerHTML = premios[numero];

    premio.style.opacity = "1";

}

</script>
</body>
</html>
