<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jostar 3D</title>

<style>

#cofre{
    display:block;
    margin:20px auto;
    cursor:pointer;
    transition:0.3s;
}

#brillo{
    font-size:40px;
    height:50px;
}

#rareza{
    color:gold;
    font-size:28px;
    font-weight:bold;
}



body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding-top:50px;
}

h1{
    color:gold;
}

button{
    background:gold;
    border:none;
    padding:15px 30px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>🎮 Jostar 3D</h1>

<p>Bienvenido a tu primera experiencia NFC.</p>
<img id="cofre" src="cofre.png.png" width="300" onclick="abrirCofre()">
<audio id="sonido">
    <source src="cofre.mp3" type="audio/mpeg">
</audio>

<div id="brillo"></div>

<h2 id="premio" style="opacity:0; transition:1s; color:gold;"></h2>
<h3 id="rareza"></h3>
<h2 id="codigo" style="color:#00ff88;"></h2>
<h3 id="contador" style="color:#ffcc00;"></h3>

<script>

let intervalo;

function abrirCofre(){

    let ultimoUso = localStorage.getItem("ultimoUso");

    if(ultimoUso){

        let tiempoRestante = 180000 - (Date.now() - parseInt(ultimoUso));

        if(tiempoRestante > 0){

            iniciarContador(tiempoRestante);
            return;
        }
    }

    localStorage.setItem("ultimoUso", Date.now());

    document.getElementById("sonido").play();

    let premio = document.getElementById("premio");
    let rareza = document.getElementById("rareza");
    let codigo = document.getElementById("codigo");
    let cofre = document.getElementById("cofre");
    let brillo = document.getElementById("brillo");

    premio.style.opacity = "0";
    rareza.innerHTML = "";
    codigo.innerHTML = "";

    brillo.innerHTML = "✨✨✨✨✨";

    cofre.style.transform = "scale(1.15)";

    setTimeout(() => {
        cofre.style.transform = "scale(1)";
    }, 300);

    let suerte = Math.random();

    setTimeout(() => {

        if (suerte < 0.70){
            premio.innerHTML = "😅 Sigue participando";
            rareza.innerHTML = "Gracias por visitar Jostar 3D";
            codigo.innerHTML = "";
        }
        else if (suerte < 0.945){
            premio.innerHTML = "🎁 ¡Ganaste 5% de descuento!";
            rareza.innerHTML = "PREMIO";
            codigo.innerHTML = "J3D-5";
        }
        else if (suerte < 0.995){
            premio.innerHTML = "🎉 ¡Ganaste 10% de descuento!";
            rareza.innerHTML = "PREMIO";
            codigo.innerHTML = "J3D-10";
        }
        else{
            premio.innerHTML = "🏆 ¡GANASTE UNA FIGURA GRATIS!";
            rareza.innerHTML = "👑 PREMIO LEGENDARIO 👑";
            codigo.innerHTML = "J3D-GRATIS";
        }

        premio.style.opacity = "1";

    }, 6500);

    setTimeout(() => {
        brillo.innerHTML = "";
    }, 6500);

    iniciarContador(180000);

}

function iniciarContador(tiempo){

    clearInterval(intervalo);

    let contador = document.getElementById("contador");

    intervalo = setInterval(() => {

        tiempo -= 1000;

        let minutos = Math.floor(tiempo / 60000);
        let segundos = Math.floor((tiempo % 60000) / 1000);

        contador.innerHTML =
        "⏳ Próximo intento en: " +
        minutos.toString().padStart(2,"0") +
        ":" +
        segundos.toString().padStart(2,"0");

        if(tiempo <= 0){

            clearInterval(intervalo);

            contador.innerHTML =
            "🎉 ¡Ya puedes volver a abrir el cofre!";
        }

    },1000);

}
</script>
</body>
</html>
