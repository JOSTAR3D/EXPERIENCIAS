<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jostar 3D</title>

<style>

#cofre{
    display:block;
    margin:20px auto;
    cursor:pointer;
    transition:0.3s;
}

#brillo{
    font-size:40px;
    height:50px;
}

#rareza{
    color:gold;
    font-size:28px;
    font-weight:bold;
}



body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding-top:50px;
}

h1{
    color:gold;
}

button{
    background:gold;
    border:none;
    padding:15px 30px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>🎮 Jostar 3D</h1>

<p>Bienvenido a tu primera experiencia NFC.</p>
<img id="cofre" src="cofre.png.png" width="300" onclick="abrirCofre()">
<audio id="sonido">
    <source src="cofre.mp3" type="audio/mpeg">
</audio>

<div id="brillo"></div>

<h2 id="premio" style="opacity:0; transition:1s; color:gold;"></h2>
<h3 id="rareza"></h3>

<script>

function abrirCofre(){

    document.getElementById("sonido").play();

    let premio = document.getElementById("premio");
    let rareza = document.getElementById("rareza");
    let cofre = document.getElementById("cofre");
    let brillo = document.getElementById("brillo");

    premio.style.opacity = "0";
    rareza.innerHTML = "";

    brillo.innerHTML = "✨✨✨✨✨";

    cofre.style.transform = "scale(1.15)";

    setTimeout(() => {
        cofre.style.transform = "scale(1)";
    }, 300);

    let suerte = Math.random();

    setTimeout(() => {

        if (suerte < 0.50){
            premio.innerHTML = "🧪 ¡Has obtenido una Poción!";
            rareza.innerHTML = "⭐ COMÚN";
        }
        else if (suerte < 0.80){
            premio.innerHTML = "💎 ¡Has encontrado un Rubí Rojo!";
            rareza.innerHTML = "⭐⭐ RARO";
        }
        else if (suerte < 0.93){
            premio.innerHTML = "🏹 ¡Has obtenido el Arco del Héroe!";
            rareza.innerHTML = "⭐⭐⭐ ÉPICO";
        }
        else if (suerte < 0.99){
            premio.innerHTML = "🛡️ ¡Has obtenido el Escudo Hyliano!";
            rareza.innerHTML = "⭐⭐⭐⭐ ÉPICO";
        }
        else{
            premio.innerHTML = "🗡️ ¡Has obtenido la Espada Maestra!";
            rareza.innerHTML = "👑 ⭐⭐⭐⭐⭐ LEGENDARIO ⭐⭐⭐⭐⭐";
        }

        premio.style.opacity = "1";

    }, 7000);

    setTimeout(() => {
        brillo.innerHTML = "";
    }, 7000);

}
</script>
</body>
</html>
